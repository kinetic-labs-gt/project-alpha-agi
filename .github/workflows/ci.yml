name: Alpha-AGI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        req_files=()
        for candidate in requirements.txt Requirements.txt REQUIREMENTS.TXT; do
          if [ -f "$candidate" ]; then
            req_files+=("$candidate")
          fi
        done
        if [ "${#req_files[@]}" -gt 1 ]; then
          echo "Multiple requirements files found: ${req_files[*]}. Keep only one." >&2
          exit 1
        elif [ "${#req_files[@]}" -eq 1 ]; then
          pip install -r "${req_files[0]}"
        else
          echo "No requirements file found in $(pwd) (checked: requirements.txt, Requirements.txt, REQUIREMENTS.TXT)." >&2
          ls -la
          exit 1
        fi

    - name: Run Core Architecture Tests
      run: |
        PYTHONPATH=. python3 arch_a/tests.py

    - name: Run Phase 6 Unit Tests
      run: |
        PYTHONPATH=. python3 -m unittest discover tests

    - name: Run Pre-train Smoke Gates
      run: |
        PYTHONPATH=. python3 scripts/run_gates.py

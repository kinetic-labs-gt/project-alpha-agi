name: Alpha-AGI CI

on:
  push:
    branches: [ "Jules", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Core Architecture Tests
      run: |
        PYTHONPATH=. python3 arch_a/tests.py

    - name: Run Phase 6 Unit Tests
      run: |
        PYTHONPATH=. python3 -m pytest -q tests/test_config_50m.py tests/test_data_pipeline.py tests/test_trainer_step.py tests/test_checkpoint_resume.py

    - name: Run Pre-train Smoke Gates
      run: |
        PYTHONPATH=. python3 scripts/run_gates.py
